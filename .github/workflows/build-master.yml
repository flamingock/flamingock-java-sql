name: Build Master
on:
  push:
    branches: [ master, develop, release/* ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unit and Integration tests
        run: |
          ./gradlew clean build \
            -Psql.test.dialects=mysql
